name: Release

on:
  release:
    types:
      - published


defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build artifacts
    strategy:
      matrix:
        os:
          - windows-2022
          - macos-15-intel
          - ubuntu-22.04
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup environment
        run: |
          echo TRIPLE_SUFFIX=${{ startsWith(matrix.os, 'windows') && 'pc-windows-msvc' || (startsWith(matrix.os, 'macos') && 'apple-darwin' || 'unknown-linux-gnu') }} >> $GITHUB_ENV
          echo OS_NAME=${{ startsWith(matrix.os, 'windows') && 'windows' || (startsWith(matrix.os, 'macos') && 'osx' || 'linux') }} >> $GITHUB_ENV
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-${{ env.TRIPLE_SUFFIX }},aarch64-${{ env.TRIPLE_SUFFIX }}
      - name: Setup cross-compilation toolchain
        run: |
          sudo apt install -y gcc-aarch64-linux-gnu
          echo -e '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
        if: ${{ env.OS_NAME == 'linux' }}
      - name: Build for x86_64
        run: cargo build --profile release
      - name: Run watchdog check (Windows)
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/watchdog_check.ps1
        if: ${{ env.OS_NAME == 'windows' }}
      - name: Build for aarch64
        run: cargo build --profile release --target aarch64-${{ env.TRIPLE_SUFFIX }}
      - name: Create universal binary
        run: |
          lipo -create -output rust-watcher target/release/rust-watcher target/aarch64-apple-darwin/release/rust-watcher
          mv rust-watcher target/release/rust-watcher
        if: ${{ env.OS_NAME == 'osx' }}
      - name: Upload binary
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.OS_NAME }}-${{ env.OS_NAME == 'osx' && 'universal2' || 'x64' }}
          path: target/release/rust-watcher${{ env.OS_NAME == 'windows' && '.exe' || '' }}
      - name: Upload aarch64 binary
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.OS_NAME }}-arm64
          path: target/aarch64-${{ env.TRIPLE_SUFFIX }}/release/rust-watcher
        if: ${{ env.OS_NAME == 'linux' }}
  push:
    name: Push artifacts
    needs: build
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
      - name: Upload artifacts to release
        run: |
          declare -A PLATFORM_MAP
          PLATFORM_MAP["osx-universal2"]="osx"
          PLATFORM_MAP["windows-x64"]="windows-x64"
          PLATFORM_MAP["linux-x64"]="linux-x64"
          PLATFORM_MAP["linux-arm64"]="linux-arm64"

          find artifacts -mindepth 1 -maxdepth 1 -type d | while read dir; do
            artifact_name=$(basename "$dir")
            platform_key="${PLATFORM_MAP[$artifact_name]}"
            if [ -z "$platform_key" ]; then
              echo "Unknown artifact: $artifact_name, skipping"
              continue
            fi
            archive="LSP-file-watcher-rust_${platform_key}.zip"
            git archive --format=zip HEAD > "$archive"
            binary=$(find "$dir" -name 'rust-watcher*' | head -1)
            if [ -n "$binary" ]; then
              chmod +x "$binary"
              zip -j "$archive" "$binary"
            fi
            gh release upload "${{ github.event.release.tag_name }}" "$archive" --clobber --repo "${{ github.repository }}"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  notify:
    name: Notify LSP packages registry
    needs: push
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch lsp-add-or-update-package event
        uses: peter-evans/repository-dispatch@v4.0.1
        with:
          token: ${{ secrets.LSP_UTILS_REPOSITORY_DISPATCH_TOKEN }}
          repository: sublimelsp/repository
          event-type: lsp-add-or-update-package
          client-payload: |-
            {
              "release": {
                "tag_name": ${{ toJSON(github.event.release.tag_name) }},
                "published_at": ${{ toJSON(github.event.release.published_at) }},
                "body": ${{ toJSON(github.event.release.body) }},
                "assets_url": ${{ toJSON(github.event.release.assets_url) }}
              },
              "repository": {
                "name": ${{ toJSON(github.event.repository.name) }},
                "html_url": ${{ toJSON(github.event.repository.html_url) }}
              }
            }
